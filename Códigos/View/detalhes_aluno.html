

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Aluno | Secretaria DF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-active {
            border-bottom: 2px solid #00d2ff;
            color: #00d2ff;
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <a href="dashboard.html" class="text-cyan-400 hover:text-cyan-300 transition-all flex items-center gap-2">
                <span>←</span> Voltar ao Painel
            </a>
            <div class="text-right">
                <h1 class="text-2xl font-bold">Consulta de Aluno</h1>
            </div>
        </header>

        <div class="glass-card p-4 rounded-2xl mb-8 flex gap-4">
            <input type="text" placeholder="Pesquisar por nome ou matrícula..." 
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white focus:outline-none focus:ring-1 focus:ring-cyan-500">
            <button class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-6 py-2 rounded-xl transition-all">
                Buscar
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="glass-card p-8 rounded-[32px] flex flex-col items-center text-center">
                <div class="w-32 h-32 rounded-full bg-gradient-to-b from-cyan-500 to-blue-600 mb-6 border-4 border-white/10 shadow-xl"></div>
                <h2 class="text-2xl font-bold mb-1">Samuel Galvão</h2> <p class="text-cyan-400 font-medium mb-6">Matrícula: 20260421</p> <div class="w-full space-y-4 text-left border-t border-white/10 pt-6 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-400">Data de Nascimento:</span> <span>15/05/2008</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Turma:</span>
                        <span>9º Ano A</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">Status:</span>
                        <span class="text-green-400">Ativo</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass-card p-8 rounded-[32px]">
                <h3 class="text-xl font-bold mb-6">Relatórios do Aluno</h3> <div class="flex gap-6 border-b border-white/10 mb-8 text-sm font-medium">
                    <button class="pb-3 tab-active">Histórico Escolar</button> <button class="pb-3 text-gray-400 hover:text-white transition-all">Relatório Saúde</button> <button class="pb-3 text-gray-400 hover:text-white transition-all">Evolução (Estudo de Caso)</button> </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition-all border border-transparent hover:border-white/10">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">📄</span>
                            <div>
                                <p class="font-semibold">Histórico_Final_2025.pdf</p>
                                <p class="text-xs text-gray-500">Adicionado em: 20/12/2025</p>
                            </div>
                        </div>
                        <button class="text-cyan-400 hover:underline text-sm">Visualizar</button>
                    </div>

                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition-all border border-transparent hover:border-white/10">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">📋</span>
                            <div>
                                <p class="font-semibold">Ficha_Medica_Atualizada.pdf</p>
                                <p class="text-xs text-gray-400">Adicionado em: 10/02/2026</p>
                            </div>
                        </div>
                        <button class="text-cyan-400 hover:underline text-sm">Visualizar</button>
                    </div>
                </div>

                <div class="mt-12 flex justify-end">
                    <button class="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 px-8 py-3 rounded-xl font-bold transition-all">
                        <span>📥</span> Importar Dados </button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
